stages: [frontend, test, build, release]

workflow:
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/   # release pipeline (vX.Y.Z)
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never                                  # no duplicate branch+MR pipelines
    - if: $CI_COMMIT_BRANCH

variables:
  CGO_ENABLED: "0"
  GOMODCACHE: "$CI_PROJECT_DIR/.gomodcache"

# 1) Build the embedded UI; pass web/dist to later stages as an artifact.
frontend:
  stage: frontend
  image: node:24-alpine
  cache:
    key: { files: [web/package-lock.json] }
    paths: [web/node_modules]
  script:
    - cd web
    - npm ci
    - npm run build          # emits web/dist
  artifacts:
    paths: [web/dist]
    expire_in: 1 day
  tags:
    - shared

# 2) Vet + unit tests + gofmt + an arm64 cross-build smoke (pure Go, no toolchain).
test:
  stage: test
  image: golang:1.26
  needs: [frontend]
  cache:
    key: gomod
    paths: [.gomodcache]
  script:
    - go vet ./...
    - go test ./...
    - out="$(gofmt -l cmd internal *.go | grep -vE "node_modules|\.gomodcache" || true)"; if [ -n "$out" ]; then echo "gofmt:"; echo "$out"; exit 1; fi
    - GOOS=linux GOARCH=arm64 go build ./...   # proves the arm64 cross-build stays clean
  tags:
    - shared

# 2b) Loopback end-to-end smoke: two nodes, gossip via --join (no multicast),
# null sinks, the full scripts/e2e.sh. Opus/alsa dlopen probes simply report
# the capability off inside the container; e2e's capability leg reads the
# container's own ldconfig, so it stays truthful either way.
e2e:
  stage: test
  image: golang:1.26
  needs: [frontend]
  # Integration smoke over a real multi-node loopback cluster. Timing-sensitive
  # in shared CI runners (slow scheduling can starve the playout deadline), so
  # it never runs automatically — trigger it by hand from the pipeline when
  # wanted. The unit `test` job is the release gate.
  rules:
    - when: manual
      allow_failure: true
  cache: { key: gomod, paths: [.gomodcache], policy: pull }
  variables:
    DEBIAN_FRONTEND: noninteractive
  script:
    - apt-get update -qq && apt-get install -y -qq --no-install-recommends jq python3 libopus0 libasound2 > /dev/null
    - ./scripts/e2e.sh
  tags:
    - shared

# 3) Cross-compile every target in parallel → downloadable artifacts.
# Branch/MR commits build 4-week dev artifacts (grab from the job page) and
# publish NO release. Tag pipelines use build-release below (never expires).
.build-template:
  stage: build
  image: golang:1.26
  needs: [frontend, test]
  cache: { key: gomod, paths: [.gomodcache], policy: pull }
  parallel:
    matrix:
      - { GOOS: linux, GOARCH: amd64 }
      - { GOOS: linux, GOARCH: arm64 }
      - { GOOS: linux, GOARCH: arm, GOARM: "6" }   # Pi Zero W / Pi 1 (ARMv6); GOARM=6 mandatory
  script:
    - VER="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"   # release tag, else dev sha
    # arm → armv<N> in the artifact name (matches scripts/build.sh); others use GOARCH as-is.
    - if [ "$GOARCH" = "arm" ]; then ARCH="armv${GOARM}"; else ARCH="$GOARCH"; fi
    - SUFFIX="${GOOS}-${ARCH}"
    - go build -trimpath -ldflags "-s -w -X main.version=$VER"
        -o "bin/ensemble-$SUFFIX" ./cmd/ensemble
    # Hand this job's id to the release stage (dotenv): release asset links
    # must address the EXACT build job — the by-ref artifacts endpoint resolves
    # branch/tag names only, never a commit SHA.
    - ARCH_KEY=$(echo "$ARCH" | tr '[:lower:]' '[:upper:]')
    - echo "BUILD_JOB_ID_${ARCH_KEY}=$CI_JOB_ID" > build.env
  tags:
    - shared

build:
  extends: .build-template
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: on_success
  artifacts:
    name: "ensemble-${CI_COMMIT_REF_SLUG}"
    paths: [bin/]
    reports:
      dotenv: build.env
    expire_in: 4 weeks

build-release:
  extends: .build-template
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  artifacts:
    name: "ensemble-${CI_COMMIT_TAG}"
    paths: [bin/]
    reports:
      dotenv: build.env
    expire_in: never

# 3c) Multi-arch (amd64 + arm64) Docker image of an ensemble MASTER, Spotify built
# in. REUSES the per-arch binaries from the build stage (already version-stamped +
# SPA-embedded) rather than recompiling — the Dockerfile just drops the right one
# onto the go-librespot base. Pushes :dev on the default branch, and :<tag>/:latest
# on a release tag. Needs a registry-auth file in the CONFIG_JSON file variable.
docker:
  stage: build
  image: docker:28-cli
  # Reuse the build job's bin/ artifacts (build on branches, build-release on
  # tags) — whichever ran in this pipeline; both publish the same bin/ paths.
  needs:
    - job: build
      optional: true
      artifacts: true
    - job: build-release
      optional: true
      artifacts: true
  # No dind service / DOCKER_HOST: the runner bind-mounts the host's
  # /var/run/docker.sock, so the docker CLI talks straight to the host daemon
  # over the default unix socket. binfmt + a docker-container buildx builder give
  # the multi-platform manifest.
  variables:
    IMAGE: "harbor.rand0m.me/public/ensemble"
    PLATFORMS: "linux/amd64,linux/arm64"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - mkdir -p ~/.docker
    - cp "${CONFIG_JSON}" ~/.docker/config.json
    # Register QEMU so the arm64 runtime-stage apk add runs under emulation.
    - docker run --privileged --rm tonistiigi/binfmt --install all
    # Fresh docker-container builder (the default "docker" driver can't emit a
    # multi-platform manifest). Idempotent across the shared host daemon.
    - docker buildx rm ensemble-builder >/dev/null 2>&1 || true
    - docker buildx create --use --name ensemble-builder
  script:
    # main → "dev"; release tag → the tag itself (also moves :latest). The binary
    # carries its own -X main.version stamp from the build job, so no build-arg.
    - VER="${CI_COMMIT_TAG:-dev}"
    - TAGS="-t $IMAGE:$VER"; if [ -n "$CI_COMMIT_TAG" ]; then TAGS="$TAGS -t $IMAGE:latest"; fi
    - docker buildx build
      --platform "$PLATFORMS"
      -f docker/Dockerfile
      $TAGS
      --push
      .
  after_script:
    - docker buildx rm ensemble-builder >/dev/null 2>&1 || true
  tags:
    - shared

# 3d) Multi-arch image of the marketing site (site/) served by nginx. Self-
# contained: the generator runs in the build stage, only the static output ships.
# Pushes :dev on the default branch, :<tag>/:latest on a release tag.
docker-site:
  stage: build
  image: docker:28-cli
  # Reuse the per-arch binaries from the build stage (build on branches,
  # build-release on tags) so they ship inside the site image's download page.
  needs:
    - job: build
      optional: true
      artifacts: true
    - job: build-release
      optional: true
      artifacts: true
  variables:
    IMAGE: "harbor.rand0m.me/public/ensemble-site"
    PLATFORMS: "linux/amd64,linux/arm64"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  before_script:
    - mkdir -p ~/.docker
    - cp "${CONFIG_JSON}" ~/.docker/config.json
    - docker run --privileged --rm tonistiigi/binfmt --install all
    - docker buildx rm site-builder >/dev/null 2>&1 || true
    - docker buildx create --name site-builder
  script:
    - VER="${CI_COMMIT_TAG:-dev}"
    - TAGS="-t $IMAGE:$VER"; if [ -n "$CI_COMMIT_TAG" ]; then TAGS="$TAGS -t $IMAGE:latest"; fi
    # Stage the prebuilt binaries as tar.gz (renamed to `ensemble` inside) where
    # build.mjs hashes them into the download page, and the installer for /get.sh.
    - |
      mkdir -p site/src/assets/downloads
      for bin in bin/ensemble-linux-*; do
        name=$(basename "$bin")
        tmp=$(mktemp -d)
        cp "$bin" "$tmp/ensemble"
        tar -czf "site/src/assets/downloads/$name.tar.gz" -C "$tmp" ensemble
        rm -rf "$tmp"
      done
      cp scripts/get.sh site/get.sh
    - docker buildx build --builder site-builder
      --platform "$PLATFORMS"
      --build-arg VER="$VER"
      -f site/Dockerfile
      $TAGS
      --push
      site
  after_script:
    - docker buildx rm site-builder >/dev/null 2>&1 || true
  tags:
    - shared

# The Android companion app lives in its own repo (share/ensemble-android) and
# builds/releases its APK there.

# 4) Changelog for a tagged release: commits since the previous v* tag.
changelog:
  stage: build
  image: golang:1.26   # any image with full git
  needs: []
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  variables:
    GIT_DEPTH: "0"     # full history so the previous tag is reachable
  script:
    - PREV=$(git tag --list 'v[0-9]*' --sort=-v:refname | grep -vx "$CI_COMMIT_TAG" | head -1 || true)
    - |
      {
        echo "## $CI_COMMIT_TAG"
        echo
        if [ -n "$PREV" ]; then
          echo "Changes since $PREV:"; echo
          git log --no-merges --pretty='- %s' "$PREV..$CI_COMMIT_TAG"
        else
          echo "Initial release."; echo
          git log --no-merges --pretty='- %s' "$CI_COMMIT_TAG" | head -50
        fi
        echo
        echo "Pure-Go binaries for linux/amd64 + linux/arm64 + linux/armv6 (Pi Zero W / Pi 1)."
        echo "Optional libraries (libopus, libasound) are loaded at runtime."
        echo "Android companion APK: see the share/ensemble-android project."
      } > release-notes.md
    - cat release-notes.md
  artifacts:
    paths: [release-notes.md]
    expire_in: 1 week
  tags:
    - shared

# 5) Publish a GitLab Release — TAGS ONLY (vX.Y.Z). The release process:
#
#     git tag -a v0.2.0 -m "v0.2.0" && git push origin v0.2.0
#
# That single push triggers this pipeline: full test + e2e gate, both
# binaries built with -X main.version=v0.2.0, a changelog generated from the
# commits since the previous tag, and a GitLab Release whose asset links
# address the EXACT build jobs by id (dotenv from the build matrix — the
# by-ref artifacts endpoint resolves branch/tag names only, never a SHA).
# Tagged-build artifacts never expire. Ordinary branch commits still build
# 4-week dev artifacts (grab them from the job page) but publish no release.
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: [build-release, changelog, test]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/
  script: [ 'echo "Releasing $CI_COMMIT_TAG (amd64 $BUILD_JOB_ID_AMD64, arm64 $BUILD_JOB_ID_ARM64, armv6 $BUILD_JOB_ID_ARMV6)"' ]
  release:
    tag_name: "$CI_COMMIT_TAG"
    name: "Ensemble $CI_COMMIT_TAG"
    description: "./release-notes.md"
    assets:
      links:
        - name: "ensemble-linux-amd64 ($CI_COMMIT_TAG)"
          url: "$CI_PROJECT_URL/-/jobs/$BUILD_JOB_ID_AMD64/artifacts/raw/bin/ensemble-linux-amd64"
        - name: "ensemble-linux-arm64 ($CI_COMMIT_TAG)"
          url: "$CI_PROJECT_URL/-/jobs/$BUILD_JOB_ID_ARM64/artifacts/raw/bin/ensemble-linux-arm64"
        - name: "ensemble-linux-armv6 ($CI_COMMIT_TAG)"
          url: "$CI_PROJECT_URL/-/jobs/$BUILD_JOB_ID_ARMV6/artifacts/raw/bin/ensemble-linux-armv6"
  tags:
    - shared
