stages: [frontend, test, build, release]

variables:
  CGO_ENABLED: "0"
  GOMODCACHE: "$CI_PROJECT_DIR/.gomodcache"

# 1) Build the embedded UI; pass internal/web/dist to later stages as an artifact.
frontend:
  stage: frontend
  image: node:22-alpine
  cache:
    key: { files: [web/package-lock.json] }
    paths: [web/node_modules]
  script:
    - cd web
    - npm ci
    - npm run build          # emits ../internal/web/dist
  artifacts:
    paths: [internal/web/dist]
    expire_in: 1 day
  tags:
    - shared

# 2) Vet + unit tests + a cross-build smoke (no toolchain needed).
test:
  stage: test
  image: golang:1.26
  needs: [frontend]
  cache:
    key: gomod
    paths: [.gomodcache]
  script:
    - go vet ./...
    - go test ./...
    - GOOS=linux GOARCH=arm64 go build ./...   # proves the arm64 cross-build stays clean
  tags:
    - shared

# 3) Cross-compile every target in parallel → downloadable artifacts.
build:
  stage: build
  image: golang:1.26
  needs: [frontend, test]
  cache: { key: gomod, paths: [.gomodcache], policy: pull }
  parallel:
    matrix:
      - { GOOS: linux, GOARCH: amd64 }
      - { GOOS: linux, GOARCH: arm64 }
  script:
    - VER="$CI_COMMIT_SHORT_SHA"   # version IS the commit hash (no tags)
    - SUFFIX="${GOOS}-${GOARCH}${GOARM:+v$GOARM}"
    - go build -trimpath -ldflags "-s -w -X main.version=$VER"
        -o "bin/ensemble-$SUFFIX" ./cmd/ensemble
    # Hand this job's id to the release stage (dotenv): release asset links
    # must address the EXACT build job — the by-ref artifacts endpoint resolves
    # branch/tag names only, never a commit SHA.
    - ARCH_KEY=$(echo "$GOARCH" | tr '[:lower:]' '[:upper:]')
    - echo "BUILD_JOB_ID_${ARCH_KEY}=$CI_JOB_ID" > build.env
  artifacts:
    name: "ensemble-${CI_COMMIT_REF_SLUG}"
    paths: [bin/]
    reports:
      dotenv: build.env
    expire_in: 4 weeks
  tags:
    - shared

# 4) Publish a GitLab Release identified by the COMMIT HASH (no manual tag):
# every branch commit releases as v-<short-sha>. A GitLab release needs a tag
# *ref* under the hood, so release-cli auto-creates one pinned to the commit —
# the operator never tags by hand. Asset links address the exact build jobs by
# id (dotenv from the build matrix): the by-ref artifacts endpoint accepts only
# branch/tag names, so SHA-based links would 404.
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: [build]
  rules:
    - if: $CI_COMMIT_BRANCH
  script: [ 'echo "Releasing $CI_COMMIT_SHORT_SHA (amd64 job $BUILD_JOB_ID_AMD64, arm64 job $BUILD_JOB_ID_ARM64)"' ]
  release:
    tag_name: "v-$CI_COMMIT_SHORT_SHA"
    ref: "$CI_COMMIT_SHA"
    name: "Ensemble $CI_COMMIT_SHORT_SHA"
    description: "Static pure-Go binaries for linux/amd64 and arm64 (commit $CI_COMMIT_SHA)."
    assets:
      links:
        - name: "ensemble-linux-amd64"
          url: "$CI_PROJECT_URL/-/jobs/$BUILD_JOB_ID_AMD64/artifacts/raw/bin/ensemble-linux-amd64"
        - name: "ensemble-linux-arm64"
          url: "$CI_PROJECT_URL/-/jobs/$BUILD_JOB_ID_ARM64/artifacts/raw/bin/ensemble-linux-arm64"
  tags:
    - shared
