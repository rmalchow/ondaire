# Ensemble node configuration (startup defaults).
#
# Resolution order (lowest to highest precedence):
#   built-in defaults  ->  this file  ->  command-line flags
#
# The config file is looked up at <data>/config.yaml unless --config is given.
# The data directory itself is set with --data (default ./data); it is NOT
# configured here, because it is the bootstrap anchor where this file is found.
#
# This file carries only the operator startup surface (ports, mDNS, audio
# device). It does NOT carry the PIN, the admin password, or per-node
# channel/gain/HWDelayUs — those are cluster/node state in the replicated
# ConfigDoc and the persisted identity (node.json), set via the web wizard / UI
# and the adoption flow, not here.

# Named sync group. All nodes sharing a group elect a master and sync to it.
# Empty leaves the node unconfigured until the web wizard / adoption activates it.
group: wall

# Friendly node name (shown in the web UI; also used as an election tiebreak).
# Empty falls back to the persisted identity name, then the node-id prefix.
node_name: node01

# --- Network ports (A.12) ----------------------------------------------------
# Each plane has its own port; the web port retries +1 on conflict so several
# nodes can share one host. Flags --web-port/--clock-port/--audio-port/--bind-port
# override these.
ports:
  web: 8443     # control plane: HTTPS (mTLS) base port
  clock: 9000   # clock plane: UDP, 4-timestamp offset estimator
  audio: 9100   # audio plane: UDP, the streamed PCM/Opus chunks
  bind: 7946    # memberlist gossip (SWIM membership)

# --- Discovery ---------------------------------------------------------------
discovery:
  # mDNS announce + browse for zero-config LAN bootstrap. Disable with --no-mdns.
  mdns: true
  # Explicit gossip seeds (host:port), used in addition to / instead of mDNS.
  # Mirrors the repeatable --join flag.
  join: []

# --- Audio -------------------------------------------------------------------
audio:
  # Sink device, e.g. an ALSA device like "hw:0". Empty = the sink's own default.
  # Overridden by --device.
  device: ""

  # Canonical audio format — READ-ONLY CONTEXT, not an operator knob (A.12).
  # The whole cluster runs at this fixed format; it is documented here only so
  # operators understand the pipeline. Changing it has no effect.
  #   rate:            48000   # Hz
  #   channels:        2       # stereo
  #   frames_per_chunk: 480    # 10 ms at 48 kHz
