# Ondaire master — example deployment. Full guide: ../QUICKSTART.md
#
#   docker compose -f docker/docker-compose.yml up -d
#
services:
  ondaire:
    # Pull the published image, or build locally (uncomment `build:`).
    image: harbor.rand0m.me/public/ondaire:latest
    # build:
    #   context: ..
    #   dockerfile: docker/Dockerfile
    container_name: ondaire-master
    restart: unless-stopped

    # Host networking is REQUIRED for a working cluster: playback nodes discover
    # the master over mDNS, and the bundled go-librespot advertises Spotify
    # Connect over zeroconf — both need real LAN presence. Ports also bind-or-
    # increment, so there is nothing to publish. (See QUICKSTART.md for the
    # bridge-mode fallback with explicit port mappings, which disables both.)
    network_mode: host

    environment:
      ONDAIRE_ROLE: master          # this image is master-only
      ONDAIRE_MEDIA_DIR: /media
      ONDAIRE_DATA_DIR: /data
      # ONDAIRE_LOG: info           # debug | info | warn | error

    # Sets the display name + the Spotify device name ("ondaire living-room").
    # First start only; afterwards the name lives in /data/node.json.
    command: ["--name", "living-room"]

    volumes:
      - /srv/music:/media:ro         # your library — READ-ONLY
      - ondaire-data:/data          # node.json, cluster.json, go-librespot creds + FIFO — READ-WRITE

volumes:
  ondaire-data:
