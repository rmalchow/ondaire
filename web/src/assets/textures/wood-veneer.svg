<svg xmlns="http://www.w3.org/2000/svg" width="560" height="560" viewBox="0 0 560 560">
  <!-- Procedural walnut veneer for the "studio" (tube-glow) theme: a warm brown
       base with horizontally-running fractal grain. Tileable (stitchTiles). -->
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="0.06">
      <stop offset="0" stop-color="#2b1d12"/>
      <stop offset="0.35" stop-color="#3b2817"/>
      <stop offset="0.6" stop-color="#33220f"/>
      <stop offset="1" stop-color="#241710"/>
    </linearGradient>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <!-- low x-frequency, high y-frequency ⇒ long horizontal grain streaks -->
      <feTurbulence type="fractalNoise" baseFrequency="0.008 0.14" numOctaves="4" seed="11" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.18
                0 0 0 0 0.11
                0 0 0 0 0.06
                0 0 0 0.85 0"/>
    </filter>
    <filter id="fineGrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.004 0.45" numOctaves="2" seed="4" stitchTiles="stitch" result="n"/>
      <feColorMatrix in="n" type="matrix"
        values="0 0 0 0 0.55
                0 0 0 0 0.40
                0 0 0 0 0.22
                0 0 0 0.18 0"/>
    </filter>
  </defs>
  <rect width="560" height="560" fill="url(#base)"/>
  <rect width="560" height="560" filter="url(#grain)" opacity="0.6"/>
  <rect width="560" height="560" filter="url(#fineGrain)" opacity="0.35"/>
</svg>
